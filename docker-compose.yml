services:
  # Container auxiliar que "abre a porta" das pastas e depois se desativa
  init:
    image: busybox
    volumes:
      - pcp_instances:/paperclip/instances
    command: chown -R 1000:1000 /paperclip/instances

  server:
    image: reeoss/paperclipai-paperclip:latest
    # user: root <-- REMOVEMOS O ROOT POR SEGURANÇA AQUI
    ports:
      - "3100:3100"
    environment:
      - PORT=3100
      - PAPERCLIP_PUBLIC_URL=${PAPERCLIP_PUBLIC_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - SERVE_UI=true
    volumes:
      - pcp_instances:/paperclip/instances
    depends_on:
      init:
        condition: service_completed
      db:
        condition: service_healthy

  db:
      image: postgres:17-alpine
      environment:
          - POSTGRES_USER=root
          - POSTGRES_PASSWORD=password
          - POSTGRES_DB=paperclip
      volumes:
          - pgdata:/var/lib/postgresql/data
      healthcheck:
          test: ["CMD-SHELL", "pg_isready -U root -d paperclip"]
          interval: 5s
          timeout: 5s
          retries: 5

volumes:
  pgdata:
  pcp_instances:
